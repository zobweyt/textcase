name: style

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/style.yaml
      - docs/.snippets/**
      - src/**
      - tests/**
      - pyproject.toml
      - uv.lock

jobs:
  style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          version: 0.6.4

      - name: Run style
        run: uv run task style
