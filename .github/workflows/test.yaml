name: test

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/test.yaml
      - src/**
      - tests/**
      - pyproject.toml
      - uv.lock

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.14"
          - "3.13"
          - "3.12"
          - "3.11"
          - "3.10"
          - "3.9"
    steps:
      - uses: actions/checkout@v7

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run test with Python version ${{ matrix.python-version }}
        run: uv run task test
